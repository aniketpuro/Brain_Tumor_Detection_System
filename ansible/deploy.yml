---
- name: Fast Deploy Brain Tumor App to AWS
  hosts: all
  become: yes
  gather_facts: false # Speeds up deployment

  tasks:
    - name: Wait for SSH to come up
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Install Docker and required packages (Fast)
      apt:
        name: 
          - docker.io
          - rsync
        state: present
        update_cache: yes

    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create app directory
      file:
        path: /opt/brain-tumor-app
        state: directory
        mode: '0755'

    - name: Copy application files to EC2
      copy:
        src: ../
        dest: /opt/brain-tumor-app/
        mode: '0755'

    - name: Build Docker Image (Uses cache if unchanged)
      command: docker build -t brain-tumor-detector .
      args:
        chdir: /opt/brain-tumor-app

    - name: Stop existing container if running
      command: docker rm -f brain-tumor-container
      ignore_errors: yes

    - name: Run new Docker Container
      command: >
        docker run -d 
        -p 5000:5000 
        --name brain-tumor-container 
        -e SMTP_EMAIL="{{ lookup('env', 'SMTP_EMAIL') }}" 
        -e SMTP_PASSWORD="{{ lookup('env', 'SMTP_PASSWORD') }}" 
        brain-tumor-detector
