---
- name: Fast Deploy Brain Tumor App to AWS
  hosts: all
  become: yes
  gather_facts: false

  tasks:
    - name: Wait for Cloud-Init (User Data) to finish
      shell: cloud-init status --wait
      timeout: 120

    - name: Create app directory
      file:
        path: /opt/brain-tumor-app
        state: directory
        mode: '0755'

    - name: Copy application files to EC2
      copy:
        src: ../
        dest: /opt/brain-tumor-app/
        mode: '0755'

    - name: Build Docker Image
      command: docker build -t brain-tumor-detector .
      args:
        chdir: /opt/brain-tumor-app

    - name: Stop existing container
      command: docker rm -f brain-tumor-container
      ignore_errors: yes

    - name: Run new Docker Container
      command: >
        docker run -d 
        -p 5000:5000 
        --name brain-tumor-container 
        -e SMTP_EMAIL="{{ lookup('env', 'SMTP_EMAIL') | default('', true) }}" 
        -e SMTP_PASSWORD="{{ lookup('env', 'SMTP_PASSWORD') | default('', true) }}" 
        brain-tumor-detector
