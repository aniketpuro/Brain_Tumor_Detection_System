apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroscan-api-route
  namespace: default
  annotations:
    # NGINX Gateway API / Ingress Controller annotations for rate limiting
    # (Note: Support for these annotations on HTTPRoute depends on the specific NGINX Gateway implementation you are using.
    # NGINX Gateway Fabric uses NginxProxy custom resources, whereas ingress-nginx supports these annotations)
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
spec:
  parentRefs:
  - name: neuroscan-gateway
    sectionName: http
  hostnames:
  - "api.neuroscan.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: neuroscan-backend-svc
      port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: neuroscan-frontend-route
  namespace: default
spec:
  parentRefs:
  - name: neuroscan-gateway
    sectionName: http
  hostnames:
  - "app.neuroscan.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: neuroscan-frontend-svc
      port: 80
