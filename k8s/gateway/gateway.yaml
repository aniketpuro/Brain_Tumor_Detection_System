apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: neuroscan-gateway
  namespace: default
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.neuroscan.local"
    tls:
      mode: Terminate
      certificateRefs:
      - name: neuroscan-tls-secret
    allowedRoutes:
      namespaces:
        from: Same
